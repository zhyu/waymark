name: Release Binaries

on:
  release:
    types:
      - published
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * *"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            artifact_name: waymark-macos-arm64
            binary_name: waymark

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: |
          rustup update stable
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Cache cargo data
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          set -euo pipefail
          package="${{ matrix.artifact_name }}"
          mkdir -p "dist/$package"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/$package/"
          cp README.md "dist/$package/"
          tar -C dist -czf "dist/$package.tar.gz" "$package"
          shasum -a 256 "dist/$package.tar.gz" > "dist/$package.tar.gz.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.artifact_name }}.tar.gz
            dist/${{ matrix.artifact_name }}.tar.gz.sha256
          if-no-files-found: error

  publish-release:
    name: Publish release assets
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: gh release upload "$TAG_NAME" release-assets/* --clobber

  publish-nightly:
    name: Publish nightly release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Prepare nightly release notes
        run: |
          cat > nightly-notes.md <<EOF
          Nightly build from \`${GITHUB_SHA}\`.

          This prerelease is replaced by each scheduled or manually dispatched nightly run.
          EOF

      - name: Publish nightly assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          NIGHTLY_TAG: nightly
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$NIGHTLY_TAG" "$GITHUB_SHA"
          git push --force origin "refs/tags/$NIGHTLY_TAG"

          if gh release view "$NIGHTLY_TAG" >/dev/null 2>&1; then
            gh release edit "$NIGHTLY_TAG" \
              --title "Nightly Build" \
              --notes-file nightly-notes.md \
              --prerelease \
              --target "$GITHUB_SHA"
          else
            gh release create "$NIGHTLY_TAG" \
              --title "Nightly Build" \
              --notes-file nightly-notes.md \
              --prerelease \
              --latest=false \
              --target "$GITHUB_SHA"
          fi

          gh release upload "$NIGHTLY_TAG" release-assets/* --clobber
